name: Aquifer Listing Alerts

on:
  schedule:
    - cron: "0 13 * * 1"        # every Monday ~9am ET (13:00 UTC)
  workflow_dispatch: {}          # also lets you run it manually from the Actions tab

permissions:
  contents: write                # allows committing the refreshed pages back

jobs:
  alerts:
    runs-on: ubuntu-latest
    container: rocker/geospatial:latest    # R + sf preinstalled
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download parcel targets (from Release)
        run: |
          curl -sL -o alerts_targets.fgb \
            "https://github.com/${{ github.repository }}/releases/download/data/alerts_targets.fgb"
          ls -la alerts_targets.fgb

      - name: Run alert engine
        env:
          RENTCAST_KEY: ${{ secrets.RENTCAST_KEY }}
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          EMAIL_TO:     "jggarner@umass.edu,linneawinter2604@gmail.com"
          NTFY_TOPIC:   "tangoats-fwuhfwuh"
          MODE:         "send"
          AQ_TARGETS:   "alerts_targets.fgb"
          AQ_SITE:      "."
          AQ_SEEN:      "seen_listings.csv"
          AQ_STATE:     "market_state.csv"
        run: Rscript alerts.R

      - name: Commit refreshed pages
        run: |
          git config user.name  "aquifer-alerts-bot"
          git config user.email "actions@users.noreply.github.com"
          git add listings.html for_sale.geojson seen_listings.csv market_state.csv 2>/dev/null || true
          git commit -m "Weekly listing refresh" || echo "no changes to commit"
          git push || echo "nothing to push"
